[mypy]
warn_unused_configs = True
allow_redefinition = True
explicit_package_bases = True
modules =
    azul.types,
    azul.collections,
    azul.args,
    azul.attrs,
    azul.auth,
    azul.azulclient,
    azul.bytes,
    azul.caching,
    azul.chalice,
    azul.bigquery,
    azul.bigquery_reservation,
    azul.csp,
    azul.deployment,
    azul.strings,
    azul.logging,
    azul,
    azul.docker,
    azul.doctests,
    azul.drs,
    azul.dss
packages =
    azul.openapi

[mypy-furl.*]
follow_untyped_imports = True

[mypy-requests.*]
follow_untyped_imports = True

[mypy-docker.*]
; https://github.com/python/typeshed/issues/13439
follow_untyped_imports = True
