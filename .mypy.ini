[mypy]
warn_unused_configs = True
allow_redefinition = True
explicit_package_bases = True
modules =
    azul.types,
    azul.collections,
    azul.args,
    azul.attrs,
    azul.auth,
    azul.azulclient,
    azul.bytes,
    azul.caching,
    azul.chalice,
    azul.bigquery,
    azul.bigquery_reservation
packages =
    azul.openapi

[mypy-furl.*]
follow_untyped_imports = True

[mypy-requests.*]
follow_untyped_imports = True